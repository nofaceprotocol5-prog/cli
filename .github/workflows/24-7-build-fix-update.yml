name: 24/7 Build, Fix & Update

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint --if-present || true
      
      - name: Run tests
        run: npm test --if-present || true
      
      - name: Build project
        run: npm run build --if-present || true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  dependency-update:
    runs-on: ubuntu-latest
    name: Update Dependencies
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Update dependencies
        run: |
          npm update
          npm audit fix --if-present || true
      
      - name: Create Pull Request for updates
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: update dependencies'
          title: '[Auto] Update Dependencies'
          body: |
            Automated dependency update from scheduled workflow.
            
            - Updated all npm packages
            - Ran npm audit fix
            
            Please review and merge if tests pass.
          branch: chore/auto-update-deps
          delete-branch: true

  code-health-check:
    runs-on: ubuntu-latest
    name: Code Health Check
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for security vulnerabilities
        run: npm audit --audit-level=moderate || true
      
      - name: Run type check
        run: npm run type-check --if-present || true
      
      - name: Generate test coverage
        run: npm run coverage --if-present || true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          fail_ci_if_error: false

  auto-fix-issues:
    runs-on: ubuntu-latest
    name: Auto-fix Issues
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Auto-fix formatting
        run: |
          npm run format --if-present || true
          npm run lint:fix --if-present || true
      
      - name: Create PR for fixes
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'style: auto-fix formatting and linting'
          title: '[Auto] Fix Code Formatting & Linting'
          body: |
            Automated code fixes from scheduled workflow.
            
            - Fixed formatting issues
            - Applied linting rules
            
            Automated by 24/7 Build System.
          branch: chore/auto-fix-issues
          delete-branch: true

  health-check-report:
    runs-on: ubuntu-latest
    name: Generate Health Report
    if: always()
    needs: [build-and-test, dependency-update, code-health-check, auto-fix-issues]
    steps:
      - name: Create summary report
        run: |
          echo "## 🤖 24/7 Automated System Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Update | ${{ needs.dependency-update.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Health | ${{ needs.code-health-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-fix | ${{ needs.auto-fix-issues.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Automated system check completed at $(date)" >> $GITHUB_STEP_SUMMARY
